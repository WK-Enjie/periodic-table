<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Periodic Table Explorer – Chemistry Made Easy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 18px 10px 8px;
      background: linear-gradient(135deg, #1a1d2e, #0f1117);
      border-bottom: 1px solid #2a2d3e;
    }
    header h1 { font-size: 1.5rem; color: #7eb8ff; letter-spacing: 1px; }
    header p { font-size: 0.85rem; color: #888; margin-top: 4px; }

    /* Search */
    .search-bar {
      display: flex; justify-content: center; padding: 12px;
    }
    .search-bar input {
      width: 320px; padding: 9px 14px; border-radius: 8px;
      border: 1px solid #333; background: #1a1d2e; color: #e0e0e0;
      font-size: 0.95rem; outline: none; transition: border .2s;
    }
    .search-bar input:focus { border-color: #7eb8ff; }

    /* Legend */
    .legend {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 8px; padding: 4px 10px 10px; font-size: 0.72rem;
    }
    .legend-item {
      display: flex; align-items: center; gap: 4px;
    }
    .legend-color {
      width: 14px; height: 14px; border-radius: 3px;
    }

    /* Table grid */
    .table-wrap {
      overflow-x: auto; padding: 0 10px 10px;
    }
    .ptable {
      display: grid;
      grid-template-columns: repeat(18, minmax(52px, 1fr));
      gap: 3px;
      min-width: 960px;
      margin: 0 auto;
      max-width: 1200px;
    }

    /* Element cell */
    .el-cell {
      position: relative;
      border-radius: 6px;
      padding: 4px 3px 3px;
      text-align: center;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      border: 1px solid rgba(255,255,255,.06);
      min-height: 58px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .el-cell:hover {
      transform: scale(1.18);
      box-shadow: 0 0 12px rgba(126,184,255,.4);
      z-index: 10;
    }
    .el-cell.dimmed { opacity: 0.18; pointer-events: none; }
    .el-num { font-size: 0.55rem; color: rgba(255,255,255,.7); }
    .el-sym { font-size: 1.05rem; font-weight: 700; line-height: 1.1; }
    .el-name { font-size: 0.45rem; opacity: .8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .el-mass { font-size: 0.45rem; opacity: .6; }

    /* Separator label */
    .sep-label {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 0.7rem;
      color: #666;
      padding: 6px 0 2px;
    }

    /* Modal */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; animation: fadeIn .2s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: #1a1d2e; border-radius: 14px;
      padding: 28px 32px; max-width: 420px; width: 90%;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
      position: relative;
    }
    .modal-close {
      position: absolute; top: 10px; right: 14px;
      background: none; border: none; color: #888;
      font-size: 1.5rem; cursor: pointer;
    }
    .modal-close:hover { color: #fff; }
    .modal-sym {
      font-size: 3rem; font-weight: 800; line-height: 1;
    }
    .modal-name { font-size: 1.3rem; font-weight: 600; color: #ccc; }
    .modal-num { font-size: 0.9rem; color: #888; margin-bottom: 14px; }
    .modal-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px 16px; margin-top: 10px; font-size: 0.85rem;
    }
    .modal-grid dt { color: #888; }
    .modal-grid dd { color: #ddd; font-weight: 500; }
    .modal-cat-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 600; margin-top: 6px;
    }

    /* Category colors */
    .cat-nonmetal        { background: #2a6e4e; color: #b8ffd8; }
    .cat-noble-gas       { background: #5b3a7a; color: #dbb8ff; }
    .cat-alkali-metal    { background: #8c3a3a; color: #ffc4c4; }
    .cat-alkaline-earth  { background: #8c6e2a; color: #ffe8a0; }
    .cat-metalloid       { background: #2a6e6e; color: #a0f0f0; }
    .cat-halogen         { background: #2a4e8c; color: #a8d0ff; }
    .cat-transition      { background: #3a5c8c; color: #b0d4ff; }
    .cat-post-transition { background: #4a6a5a; color: #b8e8c8; }
    .cat-lanthanide      { background: #6e5a2a; color: #ffe0a0; }
    .cat-actinide        { background: #6e3a4a; color: #ffb8c8; }
    .cat-unknown         { background: #444; color: #ccc; }
  </style>
